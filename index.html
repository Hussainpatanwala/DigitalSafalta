<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Safalta - Digital Marketing Agency Pune</title>
    <meta name="description" content="Digital marketing agency in Pune offering website design, SEO, social media and paid ads. Get more leads and grow your business online." />

    <!-- Fonts - optimized for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"></noscript>

    <!-- Language Switcher Styles -->
    <style>
      #lang-switcher {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 9999;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        background: rgba(255,255,255,0.95);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(0,0,0,0.1);
        border-radius: 100px;
        padding: 5px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      }
      .lang-btn {
        padding: 7px 16px;
        border-radius: 100px;
        border: none;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        font-family: 'Inter', sans-serif;
        background: transparent;
        color: #64748b;
        transition: all 0.2s ease;
        white-space: nowrap;
      }
      .lang-btn:hover {
        color: #0f172a;
        background: rgba(0,0,0,0.05);
      }
      .lang-btn.active {
        background: #059669;
        color: #ffffff;
        box-shadow: 0 2px 8px rgba(5,150,105,0.35);
      }
      /* Mobile: compact lang switcher */
@media (max-width: 768px) {
  #lang-switcher {
    bottom: 84px;
    right: 12px;
    padding: 3px;
    gap: 2px;
  }
  .lang-btn {
    padding: 5px 9px;
    font-size: 11px;
  }
}
      /* Hide Google Translate bar */
      .goog-te-banner-frame { display: none !important; }
      body { top: 0 !important; }
      .goog-te-gadget { display: none !important; }
    </style>

    <!-- Google Analytics - deferred for performance -->
    <script>
      window.addEventListener('load', function() {
        var script = document.createElement('script');
        script.src = 'https://www.googletagmanager.com/gtag/js?id=G-Z2W0WJ97T5';
        script.async = true;
        document.head.appendChild(script);
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-Z2W0WJ97T5', { 'send_page_view': true });
      });
    </script>

  </head>
  <body>

    <!-- Hidden Google Translate Element -->
    <div id="google_translate_element" style="display:none;"></div>

    <!-- Custom Language Switcher -->
    <div id="lang-switcher" role="group" aria-label="Select language">
      <button class="lang-btn active" onclick="switchLang('en', this)" aria-label="English">English</button>
      <button class="lang-btn" onclick="switchLang('hi', this)" aria-label="Hindi">हिन्दी</button>
      <button class="lang-btn" onclick="switchLang('mr', this)" aria-label="Marathi">मराठी</button>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Google Translate Init -->
    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,hi,mr',
          autoDisplay: false
        }, 'google_translate_element');
      }

      function switchLang(lang, btn) {
        // Update active button
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Trigger Google Translate
        var select = document.querySelector('.goog-te-combo');
        if (select) {
          select.value = lang;
          select.dispatchEvent(new Event('change'));
        } else {
          // Retry after translate loads
          setTimeout(function() {
            var select = document.querySelector('.goog-te-combo');
            if (select) {
              select.value = lang;
              select.dispatchEvent(new Event('change'));
            }
          }, 1000);
        }
      }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  </body>
</html>

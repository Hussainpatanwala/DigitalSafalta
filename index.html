<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Safalta - Digital Marketing Agency Pune</title>
    <meta name="description" content="Digital marketing agency in Pune offering website design, SEO, social media and paid ads. Get more leads and grow your business online." />

    <!-- Fonts - optimized for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"></noscript>

    <!-- Google Translate -->
    <style>
      #google_translate_element {
        position: fixed;
        bottom: 20px;
        left: 20px;
        z-index: 9999;
        background: #ffffff;
        border-radius: 8px;
        padding: 4px 8px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      }
      .goog-te-gadget-simple {
        border: none !important;
        background: transparent !important;
        font-size: 13px !important;
      }
      .goog-te-gadget-simple .goog-te-menu-value span {
        color: #059669 !important;
        font-weight: 500;
      }
      .goog-te-banner-frame { display: none !important; }
      body { top: 0 !important; }
    </style>

    <!-- Google Analytics - deferred for performance -->
    <script>
      window.addEventListener('load', function() {
        var script = document.createElement('script');
        script.src = 'https://www.googletagmanager.com/gtag/js?id=G-Z2W0WJ97T5';
        script.async = true;
        document.head.appendChild(script);
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-Z2W0WJ97T5', { 'send_page_view': true });
      });
    </script>

  </head>
  <body>
    <!-- Google Translate Widget -->
    <div id="google_translate_element"></div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Google Translate Script -->
    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,hi,mr',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>
